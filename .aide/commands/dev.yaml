notes:
  - No product dev server is defined yet.
  - The Python demo command is a local deterministic bootstrap lane, not a final stack commitment.
  - The architecture-boundary check is a narrow repo-local Python import guardrail, not a universal policy engine.
  - Submit and read remain in-memory bootstrap semantics; no real HTTP server or async worker exists yet.
  - The web workbench demo uses a tiny stdlib local server only for bootstrap proof and does not imply a deployment choice.
  - Search semantics remain bootstrap-scale deterministic matching over a small bounded corpus composed from synthetic fixtures plus recorded GitHub Releases fixtures and do not imply final retrieval or ranking behavior.
  - Comparison semantics remain bootstrap-scale side-by-side summaries of explicit agreements and disagreements and do not imply merge, trust ranking, or truth-selection behavior.
  - Subject-state semantics remain bootstrap-scale grouping plus deterministic ordering over one bootstrap `subject_key` and do not imply a final object identity or temporal graph contract.
  - Absence-report semantics remain bootstrap-scale checked-source summaries plus compact near matches and do not imply final diagnostics, ranking, fuzzy retrieval, or trust reasoning.
  - Manifest export remains a bounded local action over deterministic synthetic and recorded GitHub Releases-backed results and does not imply installer, download, provenance, or durable snapshot semantics.
  - Bundle export remains a bounded local action over deterministic synthetic and recorded GitHub Releases-backed results and does not imply restore, import, installer, or final snapshot semantics.
  - Bounded evidence summaries now surface through current demos and public boundaries, but they do not imply a final provenance graph, trust model, or merge contract.
  - Stored exports remain a bounded local bootstrap filesystem store with stable artifact identity and do not imply a final cache, database, or preservation contract.
  - Bundle inspection remains a local bootstrap readback seam; path-based inspection is a demo choice and not a final upload or import contract.
  - The native CLI proof remains bootstrap-scale and does not imply a final CLI, TUI, GUI, or packaging direction.
  - The local stdlib HTTP API proof remains bootstrap-scale and does not imply final auth, HTTPS/TLS, deployment, or durable public route semantics.
  - Deterministic tests and demos use recorded GitHub Releases fixtures only; live GitHub acquisition is not required and remains deferred.
  - The bounded representations proof remains bootstrap-scale and does not imply final download, install, import, restore, or representation-selection semantics.
  - The bounded compatibility proof remains bootstrap-scale, uses small fixed host profile presets only, and does not imply a final compatibility oracle, installer model, or runtime-routing engine.
  - The bounded action-plan proof remains bootstrap-scale, is recommendation-only, and does not imply final execution, installer, launcher, or workflow-policy semantics.
  - The bounded strategy-aware action-plan proof remains bootstrap-scale, varies recommendation emphasis only, and does not imply persistence, personalization, ranking, or a final user-model contract.
  - The bounded handoff proof remains bootstrap-scale, selects one preferred representation plus explicit alternatives only, and does not imply downloads, installers, launches, orchestration, or a final runtime-routing contract.
  - The bounded acquisition proof remains bootstrap-scale, reads tiny deterministic local payload fixtures only, and does not imply live downloads, installers, restore/import, launches, or final execution semantics.
  - The bounded decomposition proof remains bootstrap-scale, inspects ZIP payloads only, and does not imply broad extraction, installers, import, restore, or final package-management semantics.
  - The bounded member-readback proof remains bootstrap-scale, reads ZIP members only, and does not imply extraction-to-disk by default, installers, import, restore, or final package-management semantics.
  - The bounded resolution-run proof remains bootstrap-scale, is synchronous local JSON persistence only, and does not imply worker queues, streaming phases, full investigation planning, or durable hosted run storage.
  - The bounded resolution-memory proof remains bootstrap-scale, is explicit local JSON persistence only, and does not imply cloud/shared memory, private user-history tracking, personalization, ranking, or an invalidation engine.
  - The bounded query-planner proof remains bootstrap-scale, is deterministic and rule-based only, and does not imply LLM planning, vector search, fuzzy retrieval, ranking, or planner-driven retrieval routing.
  - The bounded local-index proof remains bootstrap-scale, uses a caller-provided local SQLite path only, prefers FTS5 when available, falls back deterministically when unavailable, and does not imply ranking, fuzzy retrieval, vector search, live source sync, incremental indexing, or final hosted search semantics.
  - The archive-resolution eval runner proof remains bootstrap-scale, reports hard-query capability gaps honestly, and does not imply ranking, fuzzy retrieval, vector search, semantic relevance, LLM planning, crawling, live source sync, or production benchmark semantics.
  - The bounded local-task proof remains bootstrap-scale, uses a caller-provided local task-store root only, persists synchronous JSON task records, and does not imply background scheduling, retries, priorities, worker daemons, or distributed queue semantics.
  - This command contract is repo-operating metadata, not runtime behavior or proof of a local AIDE product CLI.
