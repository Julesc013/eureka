  - id: web_resolution_memory_render
    run: 'python -c "import tempfile; from runtime.gateway import build_demo_resolution_runs_public_api, build_demo_resolution_memory_public_api; from runtime.gateway.public_api import PlannedSearchRunRequest, ResolutionMemoryCreateRequest; from surfaces.web.server.workbench_server import render_resolution_memory_page; td = tempfile.TemporaryDirectory(); runs = build_demo_resolution_runs_public_api(td.name); runs.start_planned_search_run(PlannedSearchRunRequest.from_parts(''"'"'latest Firefox before XP support ended'"'"''"'"')); memory = build_demo_resolution_memory_public_api(td.name, run_store_root=td.name); memory.create_memory_from_run(ResolutionMemoryCreateRequest.from_parts(''"'"'run-planned-search-0001'"'"''"'"')); print(render_resolution_memory_page(td.name, memory_id=''memory-absence-finding-0001'', run_store_root=td.name)); td.cleanup()"'
