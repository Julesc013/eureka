notes:
  - No product dev server is defined yet.
  - The Python demo command is a local deterministic bootstrap lane, not a final stack commitment.
  - The architecture-boundary check is a narrow repo-local Python import guardrail, not a universal policy engine.
  - Submit and read remain in-memory bootstrap semantics; no real HTTP server or async worker exists yet.
  - The web workbench demo uses a tiny stdlib local server only for bootstrap proof and does not imply a deployment choice.
  - Search semantics remain bootstrap-scale deterministic matching over a small bounded corpus composed from synthetic fixtures, recorded GitHub Releases fixtures, recorded Internet Archive-like fixtures, local bundle fixtures, and derived synthetic member records; they do not imply final retrieval or ranking behavior.
  - Comparison semantics remain bootstrap-scale side-by-side summaries of explicit agreements and disagreements and do not imply merge, trust ranking, or truth-selection behavior.
  - Subject-state semantics remain bootstrap-scale grouping plus deterministic ordering over one bootstrap `subject_key` and do not imply a final object identity or temporal graph contract.
  - Absence-report semantics remain bootstrap-scale checked-source summaries plus compact near matches and do not imply final diagnostics, ranking, fuzzy retrieval, or trust reasoning.
  - Manifest export remains a bounded local action over deterministic synthetic and recorded GitHub Releases-backed results and does not imply installer, download, provenance, or durable snapshot semantics.
  - Bundle export remains a bounded local action over deterministic synthetic and recorded GitHub Releases-backed results and does not imply restore, import, installer, or final snapshot semantics.
