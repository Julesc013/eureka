command: ci
status: bootstrap-executable-thin-slice
description: Minimal repo-consistency and thin-slice test checks for the current bootstrap repo.
steps:
  - id: whitespace
    run: git diff --check
  - id: repo_contract
    run: rg -n "governed component|Dependency Law|AIDE" README.md AGENTS.md docs .aide
  - id: architecture_boundaries
    run: python scripts/check_architecture_boundaries.py
  - id: archive_resolution_evals
    run: python scripts/run_archive_resolution_evals.py --json
  - id: search_usefulness_audit
    run: python scripts/run_search_usefulness_audit.py --json
  - id: public_alpha_status
    run: python scripts/demo_http_api.py --mode public_alpha status
  - id: public_alpha_smoke
    run: python scripts/public_alpha_smoke.py --json
  - id: public_alpha_route_inventory
    run: python -m unittest tests.operations.test_public_alpha_route_inventory
  - id: public_alpha_hosting_pack_summary
    run: python scripts/generate_public_alpha_hosting_pack.py --check
  - id: public_alpha_hosting_pack
    run: python -m unittest tests.operations.test_public_alpha_hosting_pack
  - id: python_oracle_golden_check
    run: python scripts/generate_python_oracle_golden.py --check
  - id: test_eval_operating_layer
    run: python -m unittest tests.operations.test_test_eval_operating_layer
  - id: comprehensive_audit_pack
    run: python -m unittest tests.operations.test_comprehensive_audit_pack
  - id: hardening_tests
    run: python -m unittest discover -s tests/hardening -t .
  - id: runtime_tests
    run: python -m unittest discover -s runtime -t .
  - id: surface_tests
    run: python -m unittest discover -s surfaces -t .
  - id: integration_tests
    run: python -m unittest discover -s tests -t .
notes:
  - Checks run only against the local deterministic Python stdlib thin slices.
  - The architecture-boundary check remains intentionally narrow and Python import focused.
  - The Python-oracle golden check is stdlib-only and verifies committed future-Rust parity fixtures without requiring Rust tooling.
  - The search-usefulness audit is stdlib-only and keeps external baselines as pending manual observations; it does not scrape Google, Internet Archive, or any other external source.
  - The test/eval operating layer and comprehensive audit pack checks are stdlib-only governance validations; they do not add product runtime behavior or production-readiness claims.
  - Hard Test Pack v0 checks are stdlib-only regression guards for eval truth, external baseline honesty, public-alpha path safety, route/docs/README drift, Python-oracle and Rust parity discipline, source placeholder honesty, memory path privacy, and AIDE/test registry consistency.
  - Rust workspace checking is intentionally not required here because normal Python verification must not depend on a Rust toolchain; use `cargo check --workspace --manifest-path crates/Cargo.toml` and `cargo test --workspace --manifest-path crates/Cargo.toml` as optional local checks.
  - This command contract is repo-operating metadata, not proof of a local AIDE product CLI.
