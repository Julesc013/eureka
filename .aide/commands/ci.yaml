command: ci
status: bootstrap-executable-thin-slice
description: Minimal repo-consistency and thin-slice test checks for the current bootstrap repo.
steps:
  - id: whitespace
    run: git diff --check
  - id: repo_contract
    run: rg -n "governed component|Dependency Law|AIDE" README.md AGENTS.md docs .aide
  - id: architecture_boundaries
    run: python scripts/check_architecture_boundaries.py
  - id: archive_resolution_evals
    run: python scripts/run_archive_resolution_evals.py --json
  - id: runtime_tests
    run: python -m unittest discover -s runtime -t .
  - id: surface_tests
    run: python -m unittest discover -s surfaces -t .
  - id: integration_tests
    run: python -m unittest discover -s tests -t .
notes:
  - Checks run only against the local deterministic Python stdlib thin slices.
  - The architecture-boundary check remains intentionally narrow and Python import focused.
  - This command contract is repo-operating metadata, not proof of a local AIDE product CLI.
