command: ci
status: bootstrap-executable-thin-slice
description: Minimal repo-consistency and thin-slice test checks for the current bootstrap repo.
steps:
  - id: whitespace
    run: git diff --check
  - id: repo_contract
    run: rg -n "governed component|Dependency Law|AIDE" README.md AGENTS.md docs .aide
  - id: architecture_boundaries
    run: python scripts/check_architecture_boundaries.py
  - id: archive_resolution_evals
    run: python scripts/run_archive_resolution_evals.py --json
  - id: search_usefulness_audit
    run: python scripts/run_search_usefulness_audit.py --json
  - id: public_alpha_status
    run: python scripts/demo_http_api.py --mode public_alpha status
  - id: public_alpha_smoke
    run: python scripts/public_alpha_smoke.py --json
  - id: public_alpha_route_inventory
    run: python -m unittest tests.operations.test_public_alpha_route_inventory
  - id: public_alpha_hosting_pack_summary
    run: python scripts/generate_public_alpha_hosting_pack.py --check
  - id: public_alpha_hosting_pack
    run: python -m unittest tests.operations.test_public_alpha_hosting_pack
  - id: python_oracle_golden_check
    run: python scripts/generate_python_oracle_golden.py --check
  - id: test_eval_operating_layer
    run: python -m unittest tests.operations.test_test_eval_operating_layer
  - id: comprehensive_audit_pack
    run: python -m unittest tests.operations.test_comprehensive_audit_pack
  - id: search_usefulness_backlog_triage
    run: python -m unittest tests.operations.test_search_usefulness_backlog_triage
  - id: search_usefulness_audit_delta
    run: python -m unittest tests.operations.test_search_usefulness_audit_delta
  - id: search_usefulness_audit_delta_v1
    run: python -m unittest tests.operations.test_search_usefulness_audit_delta_v1
  - id: hard_eval_satisfaction_pack
    run: python -m unittest tests.evals.test_hard_eval_satisfaction_pack
  - id: source_coverage_capability
    run: python -m unittest runtime.source_registry.tests.test_source_capability_coverage
  - id: real_source_coverage_pack
    run: python -m unittest runtime.connectors.internet_archive_recorded.tests.test_connector runtime.connectors.local_bundle_fixtures.tests.test_connector runtime.engine.index.tests.test_real_source_coverage_pack tests.integration.test_real_source_coverage_pack
  - id: old_platform_source_coverage_expansion
    run: python -m unittest runtime.connectors.internet_archive_recorded.tests.test_connector runtime.connectors.local_bundle_fixtures.tests.test_connector runtime.engine.synthetic_records.tests.test_member_record_synthesis runtime.engine.index.tests.test_real_source_coverage_pack runtime.engine.compatibility.tests.test_compatibility_evidence tests.integration.test_old_platform_source_coverage_expansion
  - id: old_platform_planner_pack
    run: python -m unittest runtime.engine.query_planner.tests.test_old_platform_planner
  - id: member_level_synthetic_records
    run: python -m unittest runtime.engine.synthetic_records.tests.test_member_record_synthesis runtime.engine.index.tests.test_member_level_synthetic_records tests.integration.test_member_level_synthetic_records_slice
  - id: result_lanes_user_cost
    run: python -m unittest runtime.engine.ranking.tests.test_result_lanes runtime.engine.ranking.tests.test_user_cost runtime.engine.index.tests.test_member_level_synthetic_records tests.integration.test_github_release_http_api_slice
  - id: compatibility_evidence_pack
    run: python -m unittest runtime.engine.compatibility.tests.test_compatibility_evidence runtime.engine.compatibility.tests.test_service runtime.engine.index.tests.test_member_level_synthetic_records surfaces.web.tests.test_compatibility_rendering surfaces.native.cli.tests.test_local_index_cli
  - id: hardening_tests
    run: python -m unittest discover -s tests/hardening -t .
  - id: runtime_tests
    run: python -m unittest discover -s runtime -t .
  - id: surface_tests
    run: python -m unittest discover -s surfaces -t .
  - id: integration_tests
    run: python -m unittest discover -s tests -t .
notes:
  - Checks run only against the local deterministic Python stdlib thin slices.
  - The architecture-boundary check remains intentionally narrow and Python import focused.
  - The Python-oracle golden check is stdlib-only and verifies committed future-Rust parity fixtures without requiring Rust tooling.
  - The search-usefulness audit is stdlib-only and keeps external baselines as pending manual observations; it does not scrape Google, Internet Archive, or any other external source.
  - Search Usefulness Audit Delta v0 validates a stable audit/reporting pack over current local results only; it adds no retrieval behavior and records no external baseline observations.
  - Search Usefulness Audit Delta v1 validates the measured movement after Old-Platform Source Coverage Expansion v0 and recommends hard-eval satisfaction work; it adds no retrieval behavior and records no external baseline observations.
  - Hard Eval Satisfaction Pack v0 validates source-backed archive hard-eval partial movement only; it does not weaken hard evals, fabricate evidence, add live sources, or claim any hard task is fully satisfied.
  - Source Coverage and Capability Model v0 checks validate metadata and projection only; they do not add connectors, live source probing, or crawling.
  - Real Source Coverage Pack v0 checks validate committed recorded fixtures, local bundle fixtures, local-index visibility, and public projection only; they do not add live API calls, scraping, crawling, broad source federation, or arbitrary local filesystem ingestion.
  - Old-Platform Source Coverage Expansion v0 checks validate expanded committed old-platform fixtures, local bundle members, compatibility evidence, and index visibility only; they do not add live source calls, scraping, crawling, broad source federation, arbitrary local filesystem ingestion, real binaries, or production source claims.
  - Old-Platform Software Planner Pack v0 checks validate deterministic planner interpretation only; they do not add ranking, fuzzy/vector retrieval, LLM planning, live source behavior, or new connectors.
  - Member-Level Synthetic Records v0 checks validate deterministic fixture-backed member records, parent lineage, and index/search projection only; they do not add broad extraction, arbitrary local filesystem ingestion, ranking, or live source behavior.
  - Result Lanes + User-Cost Ranking v0 checks validate deterministic lane and user-cost annotations only; they do not add production ranking, fuzzy/vector retrieval, LLM scoring, live source behavior, or new connectors.
  - Compatibility Evidence Pack v0 checks validate source-backed fixture evidence and unknown compatibility outcomes only; they do not add installer/runtime execution, a compatibility oracle, live source behavior, scraping, fuzzy/vector retrieval, LLM behavior, Rust behavior, or new connectors.
  - The test/eval operating layer and comprehensive audit pack checks are stdlib-only governance validations; they do not add product runtime behavior or production-readiness claims.
  - Hard Test Pack v0 checks are stdlib-only regression guards for eval truth, external baseline honesty, public-alpha path safety, route/docs/README drift, Python-oracle and Rust parity discipline, source placeholder honesty, memory path privacy, and AIDE/test registry consistency.
  - Rust workspace checking is intentionally not required here because normal Python verification must not depend on a Rust toolchain; use `cargo check --workspace --manifest-path crates/Cargo.toml` and `cargo test --workspace --manifest-path crates/Cargo.toml` as optional local checks.
  - This command contract is repo-operating metadata, not proof of a local AIDE product CLI.
