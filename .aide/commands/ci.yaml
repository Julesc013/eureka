notes:
  - Checks run only against the local deterministic Python stdlib thin slices.
  - The architecture-boundary check remains intentionally narrow and Python import focused.
  - The Python-oracle golden check is stdlib-only and verifies committed future-Rust parity fixtures without requiring Rust tooling.
  - The search-usefulness audit is stdlib-only and keeps external baselines as pending manual observations; it does not scrape Google, Internet Archive, or any other external source.
  - Public Search API Contract v0 validation is stdlib-only and contract-only; it does not make `/search` or `/api/v1/search` live, enable live probes, fetch URLs, scrape, download, install, upload, or search local paths.
  - Public Search Result Card Contract v0 validation is stdlib-only and contract-only; it does not emit live result cards, add runtime routes, enable downloads, installs, execution, uploads, malware-safety claims, rights-clearance claims, or production ranking guarantees.
  - Search Usefulness Audit Delta v0 validates a stable audit/reporting pack over current local results only; it adds no retrieval behavior and records no external baseline observations.
  - Search Usefulness Audit Delta v1 validates the measured movement after Old-Platform Source Coverage Expansion v0 and recommends hard-eval satisfaction work; it adds no retrieval behavior and records no external baseline observations.
  - Hard Eval Satisfaction Pack v0 validates source-backed archive hard-eval partial movement only; it does not weaken hard evals, fabricate evidence, add live sources, or claim any hard task is fully satisfied.
  - Old-Platform Result Refinement Pack v0 validates deterministic result-shape, expected-lane, and bad-result checks for archive hard evals; it does not add production ranking, fuzzy/vector retrieval, LLM scoring, live source behavior, or new connectors.
  - More Source Coverage Expansion v1 validates targeted tiny fixture evidence for the old-platform hard partials; it does not add live source behavior, scraping, arbitrary local ingestion, real binaries, or external baseline claims.
  - Article/Scan Fixture Pack v0 validates one tiny synthetic article/page/scan fixture with OCR-like text; it does not add live source behavior, scraping, OCR engines, PDF/image parsing, real scans, copyrighted article text, or external baseline claims.
  - Manual External Baseline Observation Pack v0 validates manual-only external baseline schemas, templates, instructions, pending slots, and scripts without scraping, automated external queries, APIs, or observed baseline claims.
  - Manual Observation Batch 0 validates the first prioritized pending batch without performing observations, scraping, automation, or fabricated baseline claims.
  - LIVE_ALPHA_00 Static Public Site Pack validates static public-site documentation only; it does not deploy, add hosting infrastructure, add live probes, scrape, or claim production readiness.
  - Public Alpha Rehearsal Evidence v0 validates supervised local/static evidence only; it does not deploy, approve production, add live probes, or record external observations.
  - LIVE_ALPHA_01 Production Public-Alpha Wrapper validates a stdlib public-alpha entrypoint and config guard only; it does not deploy, add provider files, enable live probes, add auth/TLS/rate limiting/process management, or approve production.
  - Public Publication Plane Contracts v0 validates public route/data/client/deployment-target/redirect governance before GitHub Pages or static generation; it does not deploy, add provider config, create a generator, enable live backend behavior, or record external observations.
  - GitHub Pages Deployment Enablement v0 validates static-only publication of site/dist through a GitHub Pages artifact workflow; it does not deploy the Python backend, enable live probes, configure a custom domain, add a generator, add secrets, or claim deployment success without Actions evidence.
  - Static Site Generation Migration v0 validates a stdlib-only site/ generator and site/dist output while keeping site/dist as the deployment artifact; it adds no Node/npm, frontend framework, deployment change, live backend, live probes, or production claim.
  - Static Artifact Promotion Review v0 validates conditional promotion of site/dist as the active repo-local static artifact while keeping GitHub Actions deployment status unverified; it adds no public search, backend hosting, live probes, or production claims.
  - GitHub Pages Run Evidence Review v0 validates recorded current-head Pages workflow evidence, including the failed Pages configuration step before artifact upload; it adds no deployment behavior, backend hosting, live search, live probes, or production claims.
  - Generated Public Data Summaries v0 validates deterministic static JSON summaries under `site/dist/data/` and `site/dist/data/`; it adds no live API, backend deployment, live probes, external observations, Node/npm, or production API stability claim.
  - Public Data Contract Stability Review v0 validates field-level generated public JSON stability governance; it adds no live API, backend deployment, live probes, external observations, runtime behavior, or production API stability claim.
  - Lite/Text/Files Seed Surfaces v0 validates static compatibility surfaces under `site/dist/lite/`, `site/dist/text/`, and `site/dist/files/`; it adds no live search, executable downloads, snapshots, relay/native runtime behavior, backend deployment, or production support claim.
  - Static Resolver Demo Snapshots v0 validates static fixture-backed resolver examples under `site/dist/demo/` and generated `site/dist/demo/`; it adds no live search, live API semantics, backend hosting, external observations, deployment behavior, or production claim.
  - Custom Domain / Alternate Host Readiness v0 validates static host portability, base-path policy, and no DNS/CNAME/provider-config/custom-domain/backend/live-probe claim; it performs no network calls and deploys nothing.
  - Live Backend Handoff Contract v0 validates future `/api/v1` route reservations, disabled live capability flags, and error-envelope docs only; it performs no network calls, hosts no backend, enables no live probes, and creates no production API guarantee.
  - Live Probe Gateway Contract v0 validates disabled candidate-source gates, cache/evidence policy, public-alpha live-probe closure, and Google manual-baseline-only posture only; it performs no network calls, implements no probes, fetches no URLs, enables no downloads, and calls no external sources.
  - Signed Snapshot Format v0 validates a repo-local static/offline snapshot contract and deterministic seed example only; it adds no real signing keys, production signatures, executable downloads, public `/snapshots/` route, relay behavior, native-client runtime, live backend behavior, or live probes.
  - Signed Snapshot Consumer Contract v0 validates future snapshot consumption contracts only; it adds no snapshot reader runtime, relay, native client, production signing, real keys, executable downloads, live backend behavior, or live probes.
  - Native Client Contract v0 validates future native client contracts only; it adds no Visual Studio/Xcode projects, native GUI, FFI, installers, downloads, relay sidecars, live probes, or Rust runtime wiring.
  - Relay Surface Design v0 validates future local/LAN relay policy only; it opens no sockets, implements no FTP/SMB/WebDAV/Gopher/protocol bridge, exposes no private data, adds no write/admin route, passes through no live probes, and creates no native sidecar.
  - Rust Source Registry Parity Catch-up v0 validates the isolated Rust source-registry candidate against the current nine-source Python capability/coverage shape; it does not wire Rust into runtime or surfaces.
  - Rust Local Index Parity Planning v0 validates planning-only Rust local-index parity contracts and fixtures; it does not add Rust index behavior, SQLite/indexing, Python replacement, runtime wiring, or surface behavior.
  - Source Coverage and Capability Model v0 checks validate metadata and projection only; they do not add connectors, live source probing, or crawling.
  - Real Source Coverage Pack v0 checks validate committed recorded fixtures, local bundle fixtures, local-index visibility, and public projection only; they do not add live API calls, scraping, crawling, broad source federation, or arbitrary local filesystem ingestion.
  - Old-Platform Source Coverage Expansion v0 checks validate expanded committed old-platform fixtures, local bundle members, compatibility evidence, and index visibility only; they do not add live source calls, scraping, crawling, broad source federation, arbitrary local filesystem ingestion, real binaries, or production source claims.
  - Old-Platform Software Planner Pack v0 checks validate deterministic planner interpretation only; they do not add ranking, fuzzy/vector retrieval, LLM planning, live source behavior, or new connectors.
  - Member-Level Synthetic Records v0 checks validate deterministic fixture-backed member records, parent lineage, and index/search projection only; they do not add broad extraction, arbitrary local filesystem ingestion, ranking, or live source behavior.
  - Result Lanes + User-Cost Ranking v0 checks validate deterministic lane and user-cost annotations only; they do not add production ranking, fuzzy/vector retrieval, LLM scoring, live source behavior, or new connectors.
  - Compatibility Evidence Pack v0 checks validate source-backed fixture evidence and unknown compatibility outcomes only; they do not add installer/runtime execution, a compatibility oracle, live source behavior, scraping, fuzzy/vector retrieval, LLM behavior, Rust behavior, or new connectors.
  - The test/eval operating layer and comprehensive audit pack checks are stdlib-only governance validations; they do not add product runtime behavior or production-readiness claims.
  - Hard Test Pack v0 checks are stdlib-only regression guards for eval truth, external baseline honesty, public-alpha path safety, route/docs/README drift, Python-oracle and Rust parity discipline, source placeholder honesty, memory path privacy, and AIDE/test registry consistency.
  - Rust workspace checking is intentionally not required here because normal Python verification must not depend on a Rust toolchain; use `cargo check --workspace --manifest-path crates/Cargo.toml` and `cargo test --workspace --manifest-path crates/Cargo.toml` as optional local checks.
  - This command contract is repo-operating metadata, not proof of a local AIDE product CLI.
