$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.eureka.invalid/archive/evidence.schema.yaml
$comment: Provisional draft skeleton only. Not yet a finalized semantic contract or compatibility promise.
title: Evidence
description: Draft canonical record for observed material that supports, contradicts, or contextualizes a claim.
type: object
additionalProperties: false
properties:
  id:
    type: string
    description: Draft canonical identifier for the evidence record.
  kind:
    type: string
    description: Draft evidence classification label.
  source:
    type: string
    description: Draft source or provenance locator.
  captured_at:
    type: string
    description: Optional capture timestamp or bounded observation label.
required:
  - id
x-eureka-status: draft
