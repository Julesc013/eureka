$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://eureka.local/contracts/archive/schemas/user_cost.schema.yaml"
title: UserCost
type: object
x-eureka-status: draft
additionalProperties: false
description: >
  Bounded deterministic user-cost annotation for current result records. Scores
  are explanation hints only and are not production relevance ranking.
required:
  - user_cost_score
  - user_cost_reasons
  - usefulness_summary
properties:
  user_cost_score:
    type: integer
    minimum: 0
    maximum: 9
  user_cost_reasons:
    type: array
    items:
      type: string
      minLength: 1
  usefulness_summary:
    type: string
    minLength: 1
