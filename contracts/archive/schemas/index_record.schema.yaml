$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://eureka.local/contracts/archive/schemas/index_record.schema.yaml"
title: IndexRecord
type: object
x-eureka-status: draft
additionalProperties: false
required:
  - index_record_id
  - record_kind
  - label
  - created_by_slice
properties:
  index_record_id:
    type: string
    minLength: 1
  record_kind:
    type: string
    enum:
      - resolved_object
      - state_or_release
      - representation
      - member
      - synthetic_member
      - evidence
      - source_record
  label:
    type: string
    minLength: 1
  summary:
    type:
      - string
      - "null"
  target_ref:
    type:
      - string
      - "null"
  resolved_resource_id:
    type:
      - string
      - "null"
  source_id:
    type:
      - string
      - "null"
  source_family:
    type:
      - string
      - "null"
  source_label:
    type:
      - string
      - "null"
  subject_key:
    type:
      - string
      - "null"
  version_or_state:
    type:
      - string
      - "null"
  representation_id:
    type:
      - string
      - "null"
  member_path:
    type:
      - string
      - "null"
  parent_target_ref:
    type:
      - string
      - "null"
  parent_resolved_resource_id:
    type:
      - string
      - "null"
  parent_representation_id:
    type:
      - string
      - "null"
  parent_object_label:
    type:
      - string
      - "null"
  member_kind:
    type:
      - string
      - "null"
  media_type:
    type:
      - string
      - "null"
  size_bytes:
    type:
      - integer
      - "null"
    minimum: 0
  content_hash:
    type:
      - string
      - "null"
  content_text:
    type:
      - string
      - "null"
  evidence:
    type: array
    items:
      type: string
  route_hints:
    type: object
    additionalProperties:
      type:
        - string
        - number
        - integer
        - boolean
        - "null"
  action_hints:
    type: array
    items:
      type: string
  compatibility_evidence:
    type: array
    items:
      $ref: ./compatibility_evidence.schema.yaml
  compatibility_summary:
    type:
      - string
      - "null"
  result_lanes:
    type: array
    items:
      type: string
      enum:
        - best_direct_answer
        - installable_or_usable_now
        - inside_bundles
        - official
        - preservation
        - community
        - documentation
        - mentions_or_traces
        - absence_or_next_steps
        - still_searching
        - other
  primary_lane:
    type:
      - string
      - "null"
  user_cost_score:
    type:
      - integer
      - "null"
    minimum: 0
    maximum: 9
  user_cost_reasons:
    type: array
    items:
      type: string
  usefulness_summary:
    type:
      - string
      - "null"
  created_by_slice:
    type: string
    minLength: 1
