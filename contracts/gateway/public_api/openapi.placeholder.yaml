openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: Eureka Gateway Public API
  version: 0.1.0-draft
  summary: Draft gateway boundary for the normal online surface path.
  description: >
    Draft public API contract for web and native surfaces in the normal online path.
    Internal broker, relay, worker, scheduler, and auth protocols are intentionally
    excluded from this document.
servers:
  - url: https://gateway.example.invalid
    description: Non-routable placeholder endpoint for draft contract work.
tags:
  - name: ResolutionJobs
    description: Draft bounded resolution job submission and read operations.
  - name: ResolutionActions
    description: Draft bounded action discovery and manifest export operations for resolved targets.
  - name: Search
    description: Draft deterministic search operations over the bounded software-first corpus.
paths:
  /v0/resolution/jobs:
    post:
      tags:
        - ResolutionJobs
      summary: Submit a bounded resolution job
      description: >
        Draft public boundary for a surface to request bounded resolution work through
        the gateway. This operation does not expose internal orchestration protocols and
        returns an accepted envelope only; current job state is read through the
        corresponding GET operation.
      operationId: submitResolutionJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitResolutionJobRequest'
      responses:
        '202':
          description: Draft accepted job envelope for follow-up read access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolutionJob'
        default:
          description: Draft error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v0/search/software:
    get:
      tags:
        - Search
      summary: Search the bounded synthetic software corpus
      description: >
        Draft public search boundary for deterministic, bounded software-first lookup
        over the current governed synthetic corpus. Ranking and broader retrieval
        semantics remain unresolved.
      operationId: searchSoftware
      parameters:
        - $ref: '#/components/parameters/SearchQuery'
      responses:
        '200':
          description: Draft deterministic search results envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResultsEnvelope'
        default:
          description: Draft error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v0/resolution/actions:
    get:
      tags:
        - ResolutionActions
      summary: List bounded resolution actions
      description: >
        Draft public boundary for discovering bounded actions that are currently
        available for a deterministic resolved target. This operation does not imply
        installers, downloads, or broader workflow orchestration.
      operationId: listResolutionActions
      parameters:
        - $ref: '#/components/parameters/TargetRef'
      responses:
        '200':
          description: Draft resolution actions envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolutionActionsEnvelope'
        default:
          description: Draft error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v0/resolution/actions/export-manifest:
    get:
      tags:
        - ResolutionActions
      summary: Export a bounded resolution manifest
      description: >
        Draft public boundary for exporting a machine-readable manifest derived from a
        deterministic resolved synthetic target. This is not a final snapshot or
        reconstruction contract.
      operationId: exportResolutionManifest
      parameters:
        - $ref: '#/components/parameters/TargetRef'
      responses:
        '200':
          description: Draft resolution manifest export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolutionManifestExport'
        '404':
          description: Draft blocked or unavailable export envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionBlockedEnvelope'
        default:
          description: Draft error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v0/resolution/jobs/{job_id}:
    get:
      tags:
        - ResolutionJobs
      summary: Read a bounded resolution job
      description: >
        Draft read boundary for job state and any bounded result summary. Internal
        broker and worker topology remains hidden.
      operationId: getResolutionJob
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Draft job envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolutionJob'
        '404':
          description: Draft not found envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        default:
          description: Draft error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  parameters:
    JobId:
      name: job_id
      in: path
      required: true
      description: Draft identifier of a bounded resolution job.
      schema:
        type: string
    TargetRef:
      name: target_ref
      in: query
      required: true
      description: Draft bounded subject selector or governed target reference.
      schema:
        type: string
    SearchQuery:
      name: q
      in: query
      required: true
      description: Draft bounded search query string.
      schema:
        type: string
  schemas:
    SubmitResolutionJobRequest:
      type: object
      additionalProperties: false
      description: Draft request envelope for bounded resolution work.
      properties:
        target_ref:
          type: string
          description: Draft subject selector, access path, or archive reference.
        requested_outputs:
          type: array
          description: Optional draft output labels requested by the surface.
          items:
            type: string
      required:
        - target_ref
    ResolutionJob:
      type: object
      additionalProperties: false
      description: >
        Draft bounded job envelope exposed through the public API. During bootstrap this
        shape is used both for accepted submit responses and for read responses.
      properties:
        job_id:
          type: string
          description: Draft job identifier.
        status:
          type: string
          description: Draft job status label.
          enum:
            - accepted
            - running
            - blocked
            - completed
            - failed
        target_ref:
          type: string
          description: Draft subject selector or access path reference copied from the request.
        requested_outputs:
          type: array
          description: Optional draft output labels copied from the request.
          items:
            type: string
        submitted_at:
          type: string
          description: Optional draft submission timestamp.
        result:
          $ref: '#/components/schemas/ResolutionResultEnvelope'
        notices:
          type: array
          items:
            $ref: '#/components/schemas/Notice'
      required:
        - job_id
        - status
    ResolutionResultEnvelope:
      type: object
      additionalProperties: false
      description: Draft bounded result summary returned as part of a resolution job.
      properties:
        primary_object:
          $ref: '#/components/schemas/ObjectSummary'
        snapshot_manifest_id:
          type: string
          description: Optional draft reference to a snapshot manifest.
        notices:
          type: array
          items:
            $ref: '#/components/schemas/Notice'
    ObjectSummary:
      type: object
      additionalProperties: false
      description: Draft public summary of an archive object suitable for surfaces.
      properties:
        id:
          type: string
          description: Draft object identifier.
        kind:
          type: string
          description: Draft object classification label.
        label:
          type: string
          description: Optional human-readable object label.
      required:
        - id
    Notice:
      type: object
      additionalProperties: false
      description: Draft surface-safe notice emitted through the public API boundary.
      properties:
        code:
          type: string
          description: Draft machine-readable notice code.
        severity:
          type: string
          enum:
            - info
            - warning
            - error
        message:
          type: string
          description: Optional human-readable notice message.
      required:
        - code
        - severity
    ErrorEnvelope:
      type: object
      additionalProperties: false
      description: Draft error envelope for public API failures.
      properties:
        code:
          type: string
          description: Draft machine-readable error code.
        message:
          type: string
          description: Optional human-readable error message.
      required:
        - code
    SearchResultsEnvelope:
      type: object
      additionalProperties: false
      description: Draft deterministic search results envelope exposed through the public API.
      properties:
        query:
          type: string
          description: Draft bounded query string echoed for the surface.
        result_count:
          type: integer
          minimum: 0
          description: Draft count of returned results.
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchResultEntry'
        absence:
          $ref: '#/components/schemas/SearchAbsence'
      required:
        - query
        - result_count
        - results
    SearchResultEntry:
      type: object
      additionalProperties: false
      description: Draft deterministic search hit summary suitable for shared surfaces.
      properties:
        target_ref:
          type: string
        object:
          $ref: '#/components/schemas/ObjectSummary'
      required:
        - target_ref
        - object
    SearchAbsence:
      type: object
      additionalProperties: false
      description: Draft structured absence report for zero-result search responses.
      properties:
        code:
          type: string
        message:
          type: string
      required:
        - code
        - message
    ResolutionActionsEnvelope:
      type: object
      additionalProperties: false
      description: Draft bounded action-discovery envelope for a resolved target.
      properties:
        target_ref:
          type: string
        actions:
          type: array
          items:
            $ref: '#/components/schemas/ResolutionActionEntry'
        notices:
          type: array
          items:
            $ref: '#/components/schemas/Notice'
      required:
        - target_ref
        - actions
    ResolutionActionEntry:
      type: object
      additionalProperties: false
      description: Draft action summary suitable for shared surfaces.
      properties:
        action_id:
          type: string
        label:
          type: string
        availability:
          type: string
          enum:
            - available
            - unavailable
        href:
          type: string
      required:
        - action_id
        - label
        - availability
    ResolutionManifestExport:
      type: object
      additionalProperties: false
      description: Draft machine-readable manifest derived from a deterministic resolved synthetic target.
      properties:
        manifest_kind:
          type: string
        manifest_version:
          type: string
        generated_from:
          type: object
          additionalProperties: false
          properties:
            kind:
              type: string
            source_name:
              type: string
            source_locator:
              type: string
          required:
            - kind
            - source_name
            - source_locator
        target_ref:
          type: string
        primary_object:
          $ref: '#/components/schemas/ObjectSummary'
        matched_state:
          type: object
          additionalProperties: false
          properties:
            id:
              type: string
            kind:
              type: string
        representations:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              id:
                type: string
              kind:
                type: string
              access_path:
                type: object
                additionalProperties: false
                properties:
                  id:
                    type: string
                  kind:
                    type: string
                  locator:
                    type: string
        source_fixture:
          type: object
          additionalProperties: false
          properties:
            kind:
              type: string
            locator:
              type: string
          required:
            - kind
            - locator
        notices:
          type: array
          items:
            $ref: '#/components/schemas/Notice'
      required:
        - manifest_kind
        - manifest_version
        - generated_from
        - target_ref
        - primary_object
        - source_fixture
        - notices
    ActionBlockedEnvelope:
      type: object
      additionalProperties: false
      description: Draft blocked or unavailable action envelope for export attempts.
      properties:
        action_id:
          type: string
        status:
          type: string
          enum:
            - blocked
        target_ref:
          type: string
        code:
          type: string
        message:
          type: string
      required:
        - action_id
        - status
        - target_ref
        - code
x-eureka-boundary: public-api
x-eureka-status: draft
