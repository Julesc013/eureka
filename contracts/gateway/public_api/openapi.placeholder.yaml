openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: Eureka Gateway Public API
  version: 0.1.0-draft
  summary: Draft gateway boundary for the normal online surface path.
  description: >
    Draft public API contract for web and native surfaces in the normal online path.
    Internal broker, relay, worker, scheduler, and auth protocols are intentionally
    excluded from this document. Eureka also has a local stdlib bootstrap HTTP API
    slice under `/api/...` as a protocol-level proof over the same public boundary,
    but that slice does not settle final durable route naming or deployment semantics.
servers:
  - url: https://gateway.example.invalid
    description: Non-routable placeholder endpoint for draft contract work.
tags:
  - name: ResolutionJobs
    description: Draft bounded resolution job submission and read operations.
  - name: Comparison
    description: Draft side-by-side comparison operations for two bounded resolved targets.
  - name: ResolutionActions
    description: Draft bounded action discovery plus manifest and portable-bundle export operations for resolved targets.
  - name: StoredExports
    description: Draft local bootstrap storage, listing, and retrieval operations for deterministic exported artifacts.
  - name: BundleInspection
    description: Draft local bootstrap inspection operations for previously exported deterministic bundles.
  - name: Search
    description: Draft deterministic search operations over the bounded software-first corpus, currently composed from synthetic fixtures plus recorded GitHub Releases fixtures.
paths:
  /v0/resolution/jobs:
    post:
      tags:
        - ResolutionJobs
      summary: Submit a bounded resolution job
      description: >
        Draft public boundary for a surface to request bounded resolution work through
        the gateway. This operation does not expose internal orchestration protocols and
        returns an accepted envelope only; current job state is read through the
        corresponding GET operation.
      operationId: submitResolutionJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitResolutionJobRequest'
      responses:
        '202':
          description: Draft accepted job envelope for follow-up read access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolutionJob'
        default:
          description: Draft error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v0/search/software:
    get:
      tags:
        - Search
      summary: Search the bounded software-first corpus
      description: >
        Draft public search boundary for deterministic, bounded software-first lookup
        over the current synthetic-plus-recorded-GitHub-Releases corpus. Ranking and
        broader retrieval semantics remain unresolved.
      operationId: searchSoftware
      parameters:
        - $ref: '#/components/parameters/SearchQuery'
      responses:
        '200':
          description: Draft deterministic search results envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResultsEnvelope'
        default:
          description: Draft error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v0/compare:
    get:
      tags:
        - Comparison
      summary: Compare two bounded resolved targets
      description: >
        Draft public comparison boundary for side-by-side comparison of exactly two
        bounded targets. This is not a merge engine, trust selector, or global
        truth-resolution contract.
      operationId: compareTargets
      parameters:
        - $ref: '#/components/parameters/LeftTargetRef'
        - $ref: '#/components/parameters/RightTargetRef'
      responses:
        '200':
          description: Draft comparison envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComparisonEnvelope'
        '404':
          description: Draft blocked comparison envelope when one or both sides cannot be resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComparisonEnvelope'
        default:
          description: Draft error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v0/resolution/actions:
    get:
      tags:
        - ResolutionActions
      summary: List bounded resolution actions
      description: >
        Draft public boundary for discovering bounded actions that are currently
        available for a deterministic resolved target. This operation does not imply
        installers, downloads, or broader workflow orchestration.
      operationId: listResolutionActions
      parameters:
        - $ref: '#/components/parameters/TargetRef'
      responses:
        '200':
          description: Draft resolution actions envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolutionActionsEnvelope'
        default:
          description: Draft error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v0/resolution/actions/export-manifest:
    get:
      tags:
        - ResolutionActions
      summary: Export a bounded resolution manifest
      description: >
        Draft public boundary for exporting a machine-readable manifest derived from a
        deterministic resolved bounded target. This is not a final snapshot,
        reconstruction, provenance, or trust contract.
      operationId: exportResolutionManifest
      parameters:
        - $ref: '#/components/parameters/TargetRef'
      responses:
        '200':
          description: Draft resolution manifest export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolutionManifestExport'
        '404':
          description: Draft blocked or unavailable export envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionBlockedEnvelope'
        default:
          description: Draft error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v0/resolution/actions/export-bundle:
    get:
      tags:
        - ResolutionActions
      summary: Export a bounded resolution bundle
      description: >
        Draft public boundary for exporting a deterministic portable bundle derived
        from a resolved bounded target. This is not a final snapshot, restore,
        provenance, or reconstruction contract.
      operationId: exportResolutionBundle
      parameters:
        - $ref: '#/components/parameters/TargetRef'
      responses:
        '200':
          description: Draft deterministic portable bundle export
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '404':
          description: Draft blocked or unavailable export envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionBlockedEnvelope'
        default:
          description: Draft error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v0/resolution/stored-exports:
    get:
      tags:
        - StoredExports
      summary: List deterministic local stored exports for a target
      description: >
        Draft public boundary for listing deterministic local exported artifacts for a
        bounded target under a caller-provided bootstrap store root. This is not a
        final database, cache, or preservation contract.
      operationId: listStoredExports
      parameters:
        - $ref: '#/components/parameters/TargetRef'
      responses:
        '200':
          description: Draft stored-exports envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoredExportsEnvelope'
        '404':
          description: Draft blocked or unavailable stored-exports envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoredExportsEnvelope'
        default:
          description: Draft error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v0/resolution/stored-exports/store-manifest:
    get:
      tags:
        - StoredExports
      summary: Store a deterministic local manifest export
      description: >
        Draft public boundary for storing a deterministic manifest export in a local
        bootstrap content-addressed store. This is not a final cache or database contract.
      operationId: storeResolutionManifest
      parameters:
        - $ref: '#/components/parameters/TargetRef'
      responses:
        '200':
          description: Draft stored manifest result envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoredArtifactStoredEnvelope'
        '404':
          description: Draft blocked or unavailable store envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionBlockedEnvelope'
        default:
          description: Draft error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v0/resolution/stored-exports/store-bundle:
    get:
      tags:
        - StoredExports
      summary: Store a deterministic local bundle export
      description: >
        Draft public boundary for storing a deterministic portable bundle in a local
        bootstrap content-addressed store. This is not a final cache or database contract.
      operationId: storeResolutionBundle
      parameters:
        - $ref: '#/components/parameters/TargetRef'
      responses:
        '200':
          description: Draft stored bundle result envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoredArtifactStoredEnvelope'
        '404':
          description: Draft blocked or unavailable store envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionBlockedEnvelope'
        default:
          description: Draft error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v0/resolution/bundles/inspect:
    get:
      tags:
        - BundleInspection
      summary: Inspect a previously exported deterministic bundle
      description: >
        Draft public boundary for local bootstrap inspection of a previously exported
        deterministic bundle. The current `bundle_path` query parameter is a
        bootstrap-only demo choice and not a final upload, import, or restore contract.
      operationId: inspectResolutionBundle
      parameters:
        - $ref: '#/components/parameters/BundlePath'
      responses:
        '200':
          description: Draft bundle inspection envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BundleInspectionEnvelope'
        '404':
          description: Draft not found inspection envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BundleInspectionEnvelope'
        '422':
          description: Draft invalid or blocked inspection envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BundleInspectionEnvelope'
        default:
          description: Draft error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v0/resolution/stored-artifact:
    get:
      tags:
        - StoredExports
      summary: Read a stored artifact by stable artifact identity
      description: >
        Draft public boundary for reading a previously stored deterministic exported
        artifact by artifact identity. The returned content type depends on the stored
        artifact kind and remains bootstrap-scale only.
      operationId: getStoredArtifact
      parameters:
        - $ref: '#/components/parameters/ArtifactId'
      responses:
        '200':
          description: Draft stored artifact content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolutionManifestExport'
            application/zip:
              schema:
                type: string
                format: binary
        '404':
          description: Draft missing or blocked stored-artifact envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoredArtifactBlockedEnvelope'
        default:
          description: Draft error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v0/resolution/stored-artifact/metadata:
    get:
      tags:
        - StoredExports
      summary: Read stored artifact metadata by stable artifact identity
      description: >
        Draft public boundary for reading bounded metadata for a previously stored
        deterministic exported artifact.
      operationId: getStoredArtifactMetadata
      parameters:
        - $ref: '#/components/parameters/ArtifactId'
      responses:
        '200':
          description: Draft stored artifact metadata envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoredArtifactLookupEnvelope'
        '404':
          description: Draft missing or blocked stored-artifact envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoredArtifactBlockedEnvelope'
        default:
          description: Draft error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v0/resolution/jobs/{job_id}:
    get:
      tags:
        - ResolutionJobs
      summary: Read a bounded resolution job
      description: >
        Draft read boundary for job state and any bounded result summary. Internal
        broker and worker topology remains hidden.
      operationId: getResolutionJob
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Draft job envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolutionJob'
        '404':
          description: Draft not found envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        default:
          description: Draft error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  parameters:
    JobId:
      name: job_id
      in: path
      required: true
      description: Draft identifier of a bounded resolution job.
      schema:
        type: string
    TargetRef:
      name: target_ref
      in: query
      required: true
      description: Draft bounded subject selector or governed target reference.
      schema:
        type: string
    LeftTargetRef:
      name: left
      in: query
      required: true
      description: Draft left-side bounded target reference for side-by-side comparison.
      schema:
        type: string
    RightTargetRef:
      name: right
      in: query
      required: true
      description: Draft right-side bounded target reference for side-by-side comparison.
      schema:
        type: string
    BundlePath:
      name: bundle_path
      in: query
      required: true
      description: Draft local bundle path used only for bootstrap inspection demos.
      schema:
        type: string
    ArtifactId:
      name: artifact_id
      in: query
      required: true
      description: Draft stable local artifact identity for a stored export.
      schema:
        type: string
    SearchQuery:
      name: q
      in: query
      required: true
      description: Draft bounded search query string.
      schema:
        type: string
  schemas:
    ResolvedResourceId:
      type: string
      description: >
        Bootstrap deterministic resolved-resource identifier derived from already-normalized
        or already-resolved data. This is not yet Eureka's final global identity,
        provenance, or merge model.
    SourceSummary:
      type: object
      additionalProperties: false
      description: Draft bounded source-family summary surfaced through the public boundary.
      properties:
        family:
          type: string
        label:
          type: string
        locator:
          type: string
      required:
        - family
        - label
        - locator
    EvidenceSummary:
      type: object
      additionalProperties: false
      description: >
        Draft bounded evidence summary surfaced through current public envelopes.
        This is not a final provenance graph, trust score, or merge contract.
      properties:
        claim_kind:
          type: string
        claim_value:
          type: string
        asserted_by_family:
          type: string
        asserted_by_label:
          type: string
        evidence_kind:
          type: string
        evidence_locator:
          type: string
        asserted_at:
          type: string
      required:
        - claim_kind
        - claim_value
        - asserted_by_family
        - evidence_kind
        - evidence_locator
    SubmitResolutionJobRequest:
      type: object
      additionalProperties: false
      description: Draft request envelope for bounded resolution work.
      properties:
        target_ref:
          type: string
          description: Draft subject selector, access path, or archive reference.
        requested_outputs:
          type: array
          description: Optional draft output labels requested by the surface.
          items:
            type: string
      required:
        - target_ref
    ResolutionJob:
      type: object
      additionalProperties: false
      description: >
        Draft bounded job envelope exposed through the public API. During bootstrap this
        shape is used both for accepted submit responses and for read responses.
      properties:
        job_id:
          type: string
          description: Draft job identifier.
        status:
          type: string
          description: Draft job status label.
          enum:
            - accepted
            - running
            - blocked
            - completed
            - failed
        target_ref:
          type: string
          description: Draft subject selector or access path reference copied from the request.
        resolved_resource_id:
          $ref: '#/components/schemas/ResolvedResourceId'
        requested_outputs:
          type: array
          description: Optional draft output labels copied from the request.
          items:
            type: string
        submitted_at:
          type: string
          description: Optional draft submission timestamp.
        result:
          $ref: '#/components/schemas/ResolutionResultEnvelope'
        notices:
          type: array
          items:
            $ref: '#/components/schemas/Notice'
      required:
        - job_id
        - status
    ResolutionResultEnvelope:
      type: object
      additionalProperties: false
      description: Draft bounded result summary returned as part of a resolution job.
      properties:
        primary_object:
          $ref: '#/components/schemas/ObjectSummary'
        source:
          $ref: '#/components/schemas/SourceSummary'
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/EvidenceSummary'
        resolved_resource_id:
          $ref: '#/components/schemas/ResolvedResourceId'
        snapshot_manifest_id:
          type: string
          description: Optional draft reference to a snapshot manifest.
        notices:
          type: array
          items:
            $ref: '#/components/schemas/Notice'
    ObjectSummary:
      type: object
      additionalProperties: false
      description: Draft public summary of an archive object suitable for surfaces.
      properties:
        id:
          type: string
          description: Draft object identifier.
        kind:
          type: string
          description: Draft object classification label.
        label:
          type: string
          description: Optional human-readable object label.
      required:
        - id
    Notice:
      type: object
      additionalProperties: false
      description: Draft surface-safe notice emitted through the public API boundary.
      properties:
        code:
          type: string
          description: Draft machine-readable notice code.
        severity:
          type: string
          enum:
            - info
            - warning
            - error
        message:
          type: string
          description: Optional human-readable notice message.
      required:
        - code
        - severity
    ErrorEnvelope:
      type: object
      additionalProperties: false
      description: Draft error envelope for public API failures.
      properties:
        code:
          type: string
          description: Draft machine-readable error code.
        message:
          type: string
          description: Optional human-readable error message.
      required:
        - code
    SearchResultsEnvelope:
      type: object
      additionalProperties: false
      description: Draft deterministic search results envelope exposed through the public API.
      properties:
        query:
          type: string
          description: Draft bounded query string echoed for the surface.
        result_count:
          type: integer
          minimum: 0
          description: Draft count of returned results.
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchResultEntry'
        absence:
          $ref: '#/components/schemas/SearchAbsence'
      required:
        - query
        - result_count
        - results
    SearchResultEntry:
      type: object
      additionalProperties: false
      description: Draft deterministic search hit summary suitable for shared surfaces.
      properties:
        target_ref:
          type: string
        resolved_resource_id:
          $ref: '#/components/schemas/ResolvedResourceId'
        object:
          $ref: '#/components/schemas/ObjectSummary'
        source:
          $ref: '#/components/schemas/SourceSummary'
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/EvidenceSummary'
      required:
        - target_ref
        - object
    SearchAbsence:
      type: object
      additionalProperties: false
      description: Draft structured absence report for zero-result search responses.
      properties:
        code:
          type: string
        message:
          type: string
      required:
        - code
        - message
    ComparisonEnvelope:
      type: object
      additionalProperties: false
      description: Draft side-by-side comparison envelope for exactly two bounded targets.
      properties:
        status:
          type: string
          enum:
            - compared
            - blocked
        left:
          $ref: '#/components/schemas/ComparisonSide'
        right:
          $ref: '#/components/schemas/ComparisonSide'
        agreements:
          type: array
          items:
            $ref: '#/components/schemas/ComparisonAgreement'
        disagreements:
          type: array
          items:
            $ref: '#/components/schemas/ComparisonDisagreement'
        notices:
          type: array
          items:
            $ref: '#/components/schemas/Notice'
      required:
        - status
        - left
        - right
        - agreements
        - disagreements
        - notices
    ComparisonSide:
      type: object
      additionalProperties: false
      description: Draft side summary used within the public comparison envelope.
      properties:
        target_ref:
          type: string
        status:
          type: string
          enum:
            - completed
            - blocked
        resolved_resource_id:
          $ref: '#/components/schemas/ResolvedResourceId'
        object:
          $ref: '#/components/schemas/ObjectSummary'
        source:
          $ref: '#/components/schemas/SourceSummary'
        version_or_state:
          type: string
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/EvidenceSummary'
        notices:
          type: array
          items:
            $ref: '#/components/schemas/Notice'
      required:
        - target_ref
        - status
        - notices
    ComparisonAgreement:
      type: object
      additionalProperties: false
      properties:
        category:
          type: string
        value:
          type: string
      required:
        - category
        - value
    ComparisonDisagreement:
      type: object
      additionalProperties: false
      properties:
        category:
          type: string
        left_value:
          type: string
        right_value:
          type: string
      required:
        - category
        - left_value
        - right_value
    ResolutionActionsEnvelope:
      type: object
      additionalProperties: false
      description: Draft bounded action-discovery envelope for a resolved target.
      properties:
        target_ref:
          type: string
        resolved_resource_id:
          $ref: '#/components/schemas/ResolvedResourceId'
        actions:
          type: array
          items:
            $ref: '#/components/schemas/ResolutionActionEntry'
        notices:
          type: array
          items:
            $ref: '#/components/schemas/Notice'
      required:
        - target_ref
        - actions
    ResolutionActionEntry:
      type: object
      additionalProperties: false
      description: Draft action summary suitable for shared surfaces.
      properties:
        action_id:
          type: string
        label:
          type: string
        availability:
          type: string
          enum:
            - available
            - unavailable
        href:
          type: string
      required:
        - action_id
        - label
        - availability
    ResolutionManifestExport:
      type: object
      additionalProperties: false
      description: Draft machine-readable manifest derived from a deterministic resolved bounded target.
      properties:
        manifest_kind:
          type: string
        manifest_version:
          type: string
        generated_from:
          type: object
          additionalProperties: false
          properties:
            kind:
              type: string
            source_name:
              type: string
            source_locator:
              type: string
          required:
            - kind
            - source_name
            - source_locator
        target_ref:
          type: string
        resolved_resource_id:
          $ref: '#/components/schemas/ResolvedResourceId'
        primary_object:
          $ref: '#/components/schemas/ObjectSummary'
        source:
          $ref: '#/components/schemas/SourceSummary'
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/EvidenceSummary'
        matched_state:
          type: object
          additionalProperties: false
          properties:
            id:
              type: string
            kind:
              type: string
        representations:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              id:
                type: string
              kind:
                type: string
              access_path:
                type: object
                additionalProperties: false
                properties:
                  id:
                    type: string
                  kind:
                    type: string
                  locator:
                    type: string
        source_fixture:
          type: object
          additionalProperties: false
          properties:
            kind:
              type: string
            locator:
              type: string
          required:
            - kind
            - locator
        notices:
          type: array
          items:
            $ref: '#/components/schemas/Notice'
      required:
        - manifest_kind
        - manifest_version
        - generated_from
        - target_ref
        - primary_object
        - source
        - notices
    ActionBlockedEnvelope:
      type: object
      additionalProperties: false
      description: Draft blocked or unavailable action envelope for manifest or bundle export attempts.
      properties:
        action_id:
          type: string
        status:
          type: string
          enum:
            - blocked
        target_ref:
          type: string
        code:
          type: string
        message:
          type: string
        notices:
          type: array
          items:
            $ref: '#/components/schemas/Notice'
      required:
        - action_id
        - status
        - target_ref
        - code
    StoredExportsEnvelope:
      type: object
      additionalProperties: false
      description: Draft local stored-exports envelope for deterministic exported artifacts.
      properties:
        target_ref:
          type: string
        resolved_resource_id:
          $ref: '#/components/schemas/ResolvedResourceId'
        store_actions:
          type: array
          items:
            $ref: '#/components/schemas/ResolutionActionEntry'
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/StoredArtifactSummary'
        notices:
          type: array
          items:
            $ref: '#/components/schemas/Notice'
      required:
        - target_ref
        - store_actions
        - artifacts
    StoredArtifactSummary:
      type: object
      additionalProperties: false
      description: Draft stored artifact summary suitable for shared surfaces.
      properties:
        artifact_id:
          type: string
        artifact_kind:
          type: string
        resolved_resource_id:
          $ref: '#/components/schemas/ResolvedResourceId'
        content_type:
          type: string
        byte_length:
          type: integer
          minimum: 0
        availability:
          type: string
          enum:
            - available
            - unavailable
        href:
          type: string
        filename:
          type: string
        source:
