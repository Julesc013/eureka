name: ResolutionWorkspace
contract_kind: shared-surface-contract
x-eureka-status: draft
description: >
  Draft shared interaction contract for web and native surfaces that submit bounded
  resolution work and observe draft results through the gateway public API boundary.
applies_to:
  - surfaces/web
  - surfaces/native
normal_path:
  gateway_operations:
    - POST /v0/resolution/jobs
    - GET /v0/resolution/jobs/{job_id}
    - GET /v0/resolution/actions?target_ref={target_ref}
    - GET /v0/resolution/actions/export-manifest?target_ref={target_ref}
    - GET /v0/resolution/actions/export-bundle?target_ref={target_ref}
    - GET /v0/resolution/stored-exports?target_ref={target_ref}
    - GET /v0/resolution/stored-exports/store-manifest?target_ref={target_ref}
    - GET /v0/resolution/stored-exports/store-bundle?target_ref={target_ref}
    - GET /v0/resolution/stored-artifact?artifact_id={artifact_id}
  shared_view_models:
    - contracts/ui/view_models/workbench_session.view_model.yaml
    - contracts/ui/view_models/resolution_actions.view_model.yaml
    - contracts/ui/view_models/stored_exports.view_model.yaml
  shared_result_shapes:
    - ResolutionJob
    - ResolutionResultEnvelope
    - ResolutionActionsEnvelope
    - StoredExportsEnvelope
    - ObjectSummary
surface_expectations:
  - surfaces submit bounded work through the public gateway boundary and do not assume internal broker, relay, worker, or scheduler topology
  - surfaces derive shared workbench session state, including any bootstrap `resolved_resource_id`, bounded source summaries, and bounded evidence summaries, from public read envelopes rather than from engine internals or browser-owned state
  - surfaces render draft job state, object summaries, bounded action availability, stored-export state, bounded evidence summaries, and notices from governed contracts
  - surfaces disclose blocked or deferred work rather than inventing completion
surface_split:
  web:
    normal_path: public gateway contracts only
  native:
    normal_path: public gateway contracts only
    deferred_path: runtime/engine/sdk/** only after an explicit offline or local-mode decision
deferred_topics:
  - explicit offline native mode and any resulting sdk usage
  - public read contracts beyond the current bounded resolution job draft
  - final action-panel behavior, local store affordances, and download or restore semantics
  - finalized surface-specific navigation or shell behavior
