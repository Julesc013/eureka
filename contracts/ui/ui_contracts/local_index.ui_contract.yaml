    const: LocalIndexUiContract
  primary_view_model:
    const: contracts/ui/view_models/local_index.view_model.yaml
  supported_surfaces:
    type: array
    items:
      type: string
      enum:
        - web
        - native_cli
        - http_api
  notes:
    type: array
    items:
      type: string
