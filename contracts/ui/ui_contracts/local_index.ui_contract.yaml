$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://eureka.local/contracts/ui/ui_contracts/local_index.ui_contract.yaml"
title: LocalIndexUiContract
type: object
x-eureka-status: draft
additionalProperties: false
required:
