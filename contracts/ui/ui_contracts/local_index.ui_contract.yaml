$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://eureka.local/contracts/ui/ui_contracts/local_index.ui_contract.yaml"
title: LocalIndexUiContract
type: object
x-eureka-status: draft
additionalProperties: false
required:
  - contract_name
  - primary_view_model
  - supported_surfaces
properties:
  contract_name:
    const: LocalIndexUiContract
  primary_view_model:
    const: contracts/ui/view_models/local_index.view_model.yaml
  supported_surfaces:
    type: array
    items:
      type: string
      enum:
        - web
        - native_cli
        - http_api
  notes:
    type: array
    items:
      type: string
default:
  contract_name: LocalIndexUiContract
  primary_view_model: contracts/ui/view_models/local_index.view_model.yaml
  supported_surfaces:
    - web
    - native_cli
    - http_api
  notes:
    - Local index result view models may include bounded result_lanes, primary_lane, user_cost_score, user_cost_reasons, and usefulness_summary.
    - These fields are deterministic usefulness annotations for current records, not final production ranking, fuzzy retrieval, vector search, or LLM scoring.
