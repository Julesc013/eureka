$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.eureka.invalid/ui/bundle_inspection.view_model.yaml
$comment: Provisional draft skeleton only. Shared across web and native surfaces in the normal online path.
title: BundleInspection
description: Draft shared surface-facing bundle inspection model aligned with the gateway public bundle inspection boundary.
type: object
additionalProperties: false
properties:
  status:
    type: string
    enum:
      - inspected
      - blocked
  resolved_resource_id:
    type: string
    description: >
      Optional bootstrap deterministic resolved-resource identifier recovered from the
      inspected bundle. This is not a final long-term identity model.
  inspection_mode:
    type: string
  source:
    type: object
    additionalProperties: false
    properties:
      kind:
        type: string
      locator:
        type: string
    required:
      - kind
      - locator
  bundle:
    type: object
    additionalProperties: false
    properties:
      bundle_kind:
        type: string
      bundle_version:
        type: string
      target_ref:
        type: string
      member_list:
        type: array
        items:
          type: string
    required:
      - member_list
  primary_object:
    type: object
    additionalProperties: false
    properties:
      id:
        type: string
      kind:
        type: string
      label:
        type: string
    required:
      - id
  evidence:
    type: array
    description: Draft bounded evidence summaries preserved through bundle export and inspection.
    items:
      type: object
      additionalProperties: false
      properties:
        claim_kind:
          type: string
        claim_value:
          type: string
        asserted_by_family:
          type: string
        asserted_by_label:
          type: string
        evidence_kind:
          type: string
        evidence_locator:
          type: string
        asserted_at:
          type: string
      required:
        - claim_kind
        - claim_value
        - asserted_by_family
        - evidence_kind
        - evidence_locator
  normalized_record:
    type: object
    additionalProperties: true
  notices:
    type: array
    items:
      type: object
      additionalProperties: false
      properties:
        code:
          type: string
        severity:
          type: string
          enum:
            - info
            - warning
            - error
        message:
          type: string
      required:
        - code
        - severity
required:
  - status
  - inspection_mode
  - source
  - notices
x-eureka-status: draft
