$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.eureka.invalid/ui/representations.view_model.yaml
$comment: Provisional draft skeleton only. Shared across web and native surfaces in the normal online path.
title: Representations
description: Draft shared representation and access-path listing model aligned with the gateway public representations boundary.
type: object
additionalProperties: false
properties:
  status:
    type: string
    enum:
      - available
      - blocked
  target_ref:
    type: string
  resolved_resource_id:
    type: string
  primary_object:
    $ref: '#/$defs/object_summary'
  source:
    $ref: '#/$defs/source_summary'
  representations:
    type: array
    items:
      $ref: '#/$defs/representation_summary'
  notices:
    type: array
    items:
      $ref: '#/$defs/notice'
required:
  - status
  - target_ref
  - representations
  - notices
$defs:
  object_summary:
    type: object
    additionalProperties: false
    properties:
      id:
        type: string
      kind:
        type: string
      label:
        type: string
    required:
      - id
  source_summary:
    type: object
    additionalProperties: false
    properties:
      family:
        type: string
      label:
        type: string
      locator:
        type: string
    required:
      - family
  representation_summary:
    type: object
    additionalProperties: false
    properties:
      representation_id:
        type: string
      representation_kind:
        type: string
      label:
        type: string
      content_type:
        type: string
      byte_length:
        type: integer
        minimum: 0
      source_family:
        type: string
      source_label:
        type: string
      source_locator:
        type: string
      access_path_id:
        type: string
      access_kind:
        type: string
      access_locator:
        type: string
      is_direct:
        type: boolean
    required:
      - representation_id
      - representation_kind
      - label
      - source_family
      - access_kind
      - is_direct
  notice:
    type: object
    additionalProperties: false
    properties:
      code:
        type: string
      severity:
        type: string
      message:
        type: string
    required:
      - code
      - severity
x-eureka-status: draft
