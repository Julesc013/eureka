$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.eureka.invalid/ui/search_results.view_model.yaml
$comment: Provisional draft skeleton only. Shared across web and native surfaces in the normal online path.
title: SearchResults
description: Draft shared surface-facing search results model aligned with the gateway public search boundary.
type: object
additionalProperties: false
properties:
  query:
    type: string
    description: Draft bounded query string echoed for the surface.
  result_count:
    type: integer
    minimum: 0
    description: Draft count of returned result summaries.
  results:
    type: array
    description: Draft ordered result summaries with bounded deterministic lane and user-cost hints.
    items:
      type: object
      additionalProperties: false
      properties:
        target_ref:
          type: string
        resolved_resource_id:
          type: string
          description: >
            Optional bootstrap deterministic resolved-resource identifier for the
            matched result summary.
        result_lanes:
          type: array
          items:
            type: string
        primary_lane:
          type: string
        user_cost_score:
          type: integer
          minimum: 0
          maximum: 9
        user_cost_reasons:
          type: array
          items:
            type: string
        usefulness_summary:
          type: string
        object:
          type: object
          additionalProperties: false
          properties:
            id:
              type: string
            kind:
              type: string
            label:
              type: string
            record_kind:
              type: string
            source_id:
              type: string
            source_family:
              type: string
            member_path:
              type: string
            parent_target_ref:
              type: string
            parent_object_label:
              type: string
            member_kind:
              type: string
            result_lanes:
              type: array
              items:
                type: string
            primary_lane:
              type: string
            user_cost_score:
              type: integer
              minimum: 0
              maximum: 9
            user_cost_reasons:
              type: array
              items:
                type: string
            usefulness_summary:
              type: string
          required:
            - id
        source:
          type: object
          additionalProperties: false
          properties:
            source_id:
              type: string
            family:
              type: string
            label:
              type: string
            locator:
              type: string
          required:
            - family
        evidence:
          type: array
          description: Draft bounded evidence summaries for the matched result.
          items:
            type: object
            additionalProperties: false
            properties:
              claim_kind:
                type: string
              claim_value:
                type: string
              asserted_by_family:
                type: string
              asserted_by_label:
                type: string
              evidence_kind:
                type: string
              evidence_locator:
                type: string
              asserted_at:
                type: string
            required:
              - claim_kind
              - claim_value
              - asserted_by_family
              - evidence_kind
              - evidence_locator
      required:
        - target_ref
        - object
  absence:
    type: object
    additionalProperties: false
    description: Draft structured absence report for zero-result searches.
    properties:
      code:
        type: string
      message:
        type: string
    required:
      - code
      - message
required:
  - query
  - result_count
  - results
x-eureka-status: draft
