$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.eureka.invalid/ui/query_plan.view_model.yaml
$comment: Provisional draft skeleton only. Shared across web and native surfaces in the normal online path.
title: QueryPlan
description: Draft shared surface-facing query-plan model aligned with the gateway public query-planner boundary.
type: object
additionalProperties: false
properties:
  status:
    type: string
  query_plan:
    type:
      - object
      - "null"
    additionalProperties: false
    properties:
      raw_query:
        type: string
      task_kind:
        type: string
      object_type:
        type: string
      constraints:
        type: object
        additionalProperties: true
      prefer:
        type: array
        items:
          type: string
      exclude:
        type: array
        items:
          type: string
      action_hints:
        type: array
        items:
          type: string
      source_hints:
        type: array
        items:
          type: string
      planner_confidence:
        type: string
      planner_notes:
        type: array
        items:
          type: string
    required:
      - raw_query
      - task_kind
      - object_type
      - constraints
      - prefer
      - exclude
      - action_hints
      - source_hints
      - planner_confidence
      - planner_notes
  notices:
    type: array
    items:
      type: object
      additionalProperties: false
      properties:
        code:
          type: string
        severity:
          type: string
        message:
          type: string
      required:
        - code
        - severity
required:
  - status
  - query_plan
x-eureka-status: draft
