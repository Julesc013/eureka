$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.eureka.invalid/ui/workbench_session.view_model.yaml
$comment: Provisional draft skeleton only. Shared across web and native surfaces in the normal online path.
title: WorkbenchSession
description: Draft shared surface-facing session model aligned with gateway public API read envelopes and shared across web and native surfaces.
type: object
additionalProperties: false
properties:
  session_id:
    type: string
    description: Draft surface session identifier.
  resolved_resource_id:
    type: string
    description: >
      Optional bootstrap deterministic resolved-resource identifier propagated from
      public resolution results. This is not yet Eureka's final global identity model.
  active_job:
    type: object
    additionalProperties: false
    description: Draft active job summary aligned with the gateway ResolutionJob envelope.
    properties:
      job_id:
        type: string
      status:
        type: string
        enum:
          - accepted
          - running
          - blocked
          - completed
          - failed
      target_ref:
        type: string
    required:
      - job_id
      - status
  selected_object:
    type: object
    additionalProperties: false
    description: Draft selected object summary aligned with the gateway result envelope.
    properties:
      id:
        type: string
      kind:
        type: string
      label:
        type: string
      record_kind:
        type: string
      source_id:
        type: string
      source_family:
        type: string
      member_path:
        type: string
      parent_target_ref:
        type: string
      parent_object_label:
        type: string
      member_kind:
        type: string
      result_lanes:
        type: array
        items:
          type: string
      primary_lane:
        type: string
      user_cost_score:
        type: integer
        minimum: 0
        maximum: 9
      user_cost_reasons:
        type: array
        items:
          type: string
      usefulness_summary:
        type: string
      compatibility_evidence:
        type: array
        items:
          type: object
      compatibility_summary:
        type: string
    required:
      - id
  source:
    type: object
    additionalProperties: false
    description: Draft bounded source-family summary aligned with gateway public resolution results.
    properties:
      family:
        type: string
      label:
        type: string
      locator:
        type: string
    required:
      - family
  evidence:
    type: array
    description: >
      Draft bounded evidence summaries surfaced for the selected result without
      implying a final provenance graph, trust model, or merge contract.
    items:
      type: object
      additionalProperties: false
      properties:
        claim_kind:
          type: string
        claim_value:
          type: string
        asserted_by_family:
          type: string
        asserted_by_label:
          type: string
        evidence_kind:
          type: string
        evidence_locator:
          type: string
        asserted_at:
          type: string
      required:
        - claim_kind
        - claim_value
        - asserted_by_family
        - evidence_kind
        - evidence_locator
  representations:
    type: array
    description: >
      Draft bounded representation and access-path summaries surfaced for the
      selected result without implying final download, install, import, or restore
      semantics.
    items:
      type: object
      additionalProperties: false
      properties:
        representation_id:
          type: string
        representation_kind:
          type: string
        label:
          type: string
        content_type:
          type: string
        byte_length:
          type: integer
          minimum: 0
        filename:
          type: string
        source_family:
          type: string
        source_label:
          type: string
        source_locator:
          type: string
        access_path_id:
          type: string
        access_kind:
          type: string
        access_locator:
          type: string
        is_direct:
          type: boolean
        is_fetchable:
          type: boolean
      required:
        - representation_id
        - representation_kind
        - label
        - source_family
        - access_kind
        - is_direct
        - is_fetchable
  notices:
    type: array
    items:
      type: object
      additionalProperties: false
      properties:
        code:
          type: string
        severity:
          type: string
          enum:
            - info
            - warning
            - error
        message:
          type: string
      required:
        - code
        - severity
required:
  - session_id
x-eureka-status: draft
