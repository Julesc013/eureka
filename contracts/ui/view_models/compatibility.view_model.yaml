$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.eureka.invalid/ui/compatibility.view_model.yaml
$comment: Provisional draft skeleton only. Shared across web and native surfaces in the normal path.
title: Compatibility
description: Draft shared bounded compatibility verdict model aligned with the gateway public compatibility boundary.
type: object
additionalProperties: false
properties:
  status:
    type: string
    enum:
      - evaluated
      - blocked
  target_ref:
    type: string
  compatibility_status:
    type: string
    enum:
      - compatible
      - incompatible
      - unknown
  resolved_resource_id:
    type: string
  host_profile:
    $ref: '#/$defs/host_profile'
  primary_object:
    $ref: '#/$defs/object_summary'
  source:
    $ref: '#/$defs/source_summary'
  reasons:
    type: array
    items:
      $ref: '#/$defs/reason'
  compatibility_evidence:
    type: array
    items:
      type: object
  compatibility_evidence_verdict:
    type: object
  next_steps:
    type: array
    items:
      type: string
  notices:
    type: array
    items:
      $ref: '#/$defs/notice'
required:
  - status
  - target_ref
  - host_profile
  - reasons
  - next_steps
  - notices
$defs:
  host_profile:
    type: object
    additionalProperties: false
    properties:
      host_profile_id:
        type: string
      os_family:
        type: string
      architecture:
        type: string
      runtime_family:
        type: string
      features:
        type: array
        items:
          type: string
    required:
      - host_profile_id
      - os_family
      - architecture
      - features
  object_summary:
    type: object
    additionalProperties: false
    properties:
      id:
        type: string
      kind:
        type: string
      label:
        type: string
    required:
      - id
  source_summary:
    type: object
    additionalProperties: false
    properties:
      family:
        type: string
      label:
        type: string
      locator:
        type: string
    required:
      - family
  reason:
    type: object
    additionalProperties: false
    properties:
      code:
        type: string
      message:
        type: string
    required:
      - code
      - message
  notice:
    type: object
    additionalProperties: false
    properties:
      code:
        type: string
      severity:
        type: string
      message:
        type: string
    required:
      - code
      - severity
x-eureka-status: draft
