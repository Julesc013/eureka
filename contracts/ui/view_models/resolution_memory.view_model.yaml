$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://eureka.local/contracts/ui/view_models/resolution_memory.view_model.yaml"
title: ResolutionMemoryViewModel
type: object
x-eureka-status: draft
additionalProperties: false
required:
  - status
  - memory_count
  - memories
properties:
  status:
    type: string
    enum:
      - listed
      - available
      - blocked
  memory_count:
    type: integer
    minimum: 0
  selected_memory_id:
    type: string
  requested_run_id:
    type: string
  memories:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - memory_id
        - memory_kind
        - source_run_id
        - created_at
        - checked_source_ids
        - checked_source_families
        - checked_sources
        - result_summaries
        - useful_source_ids
        - evidence_summary
        - notices
        - created_by_slice
      properties:
        memory_id:
          type: string
        memory_kind:
          type: string
        source_run_id:
          type: string
        raw_query:
          type: string
        task_kind:
          type: string
        requested_value:
          type: string
        created_at:
          type: string
        checked_source_ids:
          type: array
          items:
            type: string
        checked_source_families:
          type: array
          items:
            type: string
        checked_sources:
          type: array
          items:
            type: object
            additionalProperties: false
            required:
              - source_id
              - name
              - source_family
              - status
              - trust_lane
            properties:
              source_id:
                type: string
              name:
                type: string
              source_family:
                type: string
              status:
                type: string
              trust_lane:
                type: string
        result_summaries:
          type: array
          items:
            type: object
        absence_report:
          type: object
        useful_source_ids:
          type: array
          items:
            type: string
        primary_resolved_resource_id:
          type: string
        resolution_task:
          type: object
        evidence_summary:
          type: array
          items:
            type: object
        invalidation_hints:
          type: object
        notices:
          type: array
          items:
            type: object
            additionalProperties: false
            required:
              - code
              - severity
            properties:
              code:
                type: string
              severity:
                type: string
              message:
                type:
                  - string
                  - "null"
        created_by_slice:
          type: string
  notices:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - code
        - severity
      properties:
        code:
          type: string
        severity:
          type: string
        message:
          type:
            - string
            - "null"
