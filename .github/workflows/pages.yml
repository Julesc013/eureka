name: Deploy static public site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Validate and deploy public_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check generated public data summaries
        run: python scripts/generate_public_data_summaries.py --check

      - name: Validate publication inventory
        run: python scripts/validate_publication_inventory.py

      - name: Validate static public site
        run: python scripts/validate_public_static_site.py

      - name: Check GitHub Pages static artifact
        run: python scripts/check_github_pages_static_artifact.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static public site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public_site

      - name: Deploy static public site to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
