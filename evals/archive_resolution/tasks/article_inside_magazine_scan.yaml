    "article-level record with page range",
    "page-level or section-level trace inside a scanned magazine",
    "OCR-backed page locator that narrows the scan to a relevant segment"
  ],
  "minimum_granularity": "article_or_page_range",
  "required_evidence": [
    "topic clue tied to the scan or pages",
    "page, section, or article locator",
    "source-family visibility"
  ],
  "expected_lanes": [
    "best_direct_answer",
    "inside_bundles",
    "preservation",
    "documentation",
    "absence_or_next_steps"
  ],
